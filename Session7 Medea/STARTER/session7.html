<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- step 0:  Load the jsPsych library and plugins -->
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" >

    <title>Session 7</title>
</head>
<body>
        // Step 1: add script for experiment
        // Step 2: initiate (call) jsPsych instance and assign to a variable 
        // Step 3:  build your timeline (empty in the beginning)
        // Step 4: run your jsPsych

        <script>
         const jsPsych = initJsPsych();
         const timeline = [] //timeline is empty here

         const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: "<h1>+</h1>",
            choices: "NO_KEYS",
            trial_duration: 1000 };

        timeline.push(fixation);

        function drawFn(canvas){
            const ctx = canvas.getContext("2d");
            console.dir(ctx); // Canvas (Vor)Einstellungen ansehen- Eigenschaften des JavaScript-Objekts
            ctx.fillStyle="pink";
            ctx.fillRect(500, 500, 100, 50) // filled Rectangle
            ctx.strokeStyle="red";
            ctx.strokeRect(500, 500, 100, 50); // Rectangle outline
            ctx.clearRect(500, 500, 10, 10) // clears an Rectangle area
        }

        const canvasTrial = {
            type: jsPsychCanvasKeyboardResponse,
            canvas_size: [window.innerHeight, window.innerWidth],
            stimulus: drawFn, //siehe oben
            choices: "9",
            trial_duration: 5000}
        
        timeline.push(canvasTrial);

        function drawShapes(canvas){
            const ctx = canvas.getContext("2d");
            console.dir(ctx);
            ctx.beginPath();
            ctx.moveTo(150,50);
            ctx.lineTo(100,150);
            ctx.lineTo(200,150);
            ctx.closePath();
            ctx.fillStyle="lightgreen";
            ctx.fill();
            ctx.strokeStyle="black";
            ctx.stroke();
        }

        const canvasTrial2 = {
            type: jsPsychCanvasKeyboardResponse,
            canvas_size: [window.innerHeight, window.innerWidth],
            stimulus: drawShapes, //siehe oben
            choices: "5",
            trial_duration: 7000}
        
        timeline.push(canvasTrial2);

        function drawShapes2(canvas){
            const ctx = canvas.getContext("2d");
            console.dir(ctx);
            ctx.beginPath();
            ctx.arc(100,100,50,0,2*Math.PI);
            ctx.fillStyle = "lightblue";
            ctx.fill();
            ctx.cstrokeStyle="blue";
            ctx.stroke();
            ctx.closePath();
        }

        const canvasTrial3 = {
            type: jsPsychCanvasKeyboardResponse,
            canvas_size: [window.innerHeight, window.innerWidth],
            stimulus: drawShapes2, //siehe oben
            choices: "3",
            trial_duration: 7000}
        
        timeline.push(canvasTrial3);

         jsPsych.run(timeline);
        </script>




</body>
</html>
